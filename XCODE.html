<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* Panel Kontrol Utama */
        .main-control-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 14px 20px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.28);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(6px);
            max-width: 94vw;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .cdi-filter-title {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #555;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Dropdown Wilayah */
        .region-select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            outline: none;
            cursor: pointer;
            min-width: 150px;
            background-color: #fff;
        }

        /* Tombol CDI */
        .cdi-btn {
            border: 2.5px solid transparent;
            border-radius: 10px;
            padding: 6px 11px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
            font-size: 11px;
            line-height: 1.4;
            transition: all 0.18s ease;
            outline: none;
            white-space: nowrap;
            text-align: center;
        }

        .cdi-btn small {
            display: block;
            font-weight: 400;
            font-size: 9.5px;
            opacity: 0.88;
            margin-top: 1px;
        }

        .cdi-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.22);
        }

        .cdi-btn.active {
            border-color: #111 !important;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.32);
            transform: translateY(-2px) scale(1.06);
        }

        /* Banner Informasi */
        .cdi-info-banner {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: rgba(20, 20, 20, 0.82);
            color: #fff;
            border-radius: 10px;
            padding: 9px 18px 9px 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(5px);
            max-width: 82vw;
            border-left: 5px solid #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        .cdi-divider {
            width: 1px;
            height: 24px;
            background: rgba(0,0,0,0.12);
        }
        </style>
        <title>Peta Interaktif CDI dan Wilayah</title>
    </head>
    <body>
        <div id="map"></div>

        <div class="main-control-panel" id="mainControlPanel">
            <div class="panel-row">
                <span class="cdi-filter-title">📍 Wilayah:</span>
                <select id="select-kecamatan" class="region-select" onchange="onChangeKecamatan()">
                    <option value="ALL">-- Semua Kecamatan --</option>
                </select>
                <select id="select-kelurahan" class="region-select" onchange="applyCombinedFilter()">
                    <option value="ALL">-- Semua Kelurahan --</option>
                </select>
                <button class="cdi-btn" style="background: #e0e0e0; color: #333; padding: 4px 8px; border-radius: 6px;" onclick="resetWilayah()">Reset Wilayah</button>
            </div>

            <div style="width: 100%; height: 1px; background: rgba(0,0,0,0.06);"></div>

            <div class="panel-row">
                <span class="cdi-filter-title">🗺 Kategori CDI:</span>
                <div class="cdi-divider"></div>
                <button class="cdi-btn" id="btn-0" style="background: rgba(26,150,65,1.0); color: #fff;" onclick="filterByCDIClick(0)">0 – 0,25 <small>Tidak Kumuh</small></button>
                <button class="cdi-btn" id="btn-1" style="background: rgba(166,217,106,1.0); color: #2a4a10;" onclick="filterByCDIClick(1)">0,25 – 0,5 <small>Ringan</small></button>
                <button class="cdi-btn" id="btn-2" style="background: rgba(255,255,192,1.0); color: #555;" onclick="filterByCDIClick(2)">0,5 – 0,65 <small>Sedang</small></button>
                <button class="cdi-btn" id="btn-3" style="background: rgba(253,174,97,1.0); color: #5a2e00;" onclick="filterByCDIClick(3)">0,65 – 0,77 <small>Berat</small></button>
                <button class="cdi-btn" id="btn-4" style="background: rgba(215,25,28,1.0); color: #fff;" onclick="filterByCDIClick(4)">0,77 – 1 <small>Sangat Kumuh</small></button>
                <div class="cdi-divider"></div>
                <button class="cdi-btn active" id="btn-all" style="background: #444; color: #fff;" onclick="filterByCDIClick(-1)">Semua <small>Reset CDI</small></button>
            </div>
        </div>

        <div class="cdi-info-banner" id="cdiInfoBanner"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/lastyh_1.js"></script>
        <script>
        var map = L.map('map', { zoomControl:false, maxZoom:28, minZoom:1 }).fitBounds([[-6.40908651656586,106.54663103999921],[-5.992128468130886,107.23905950948236]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0', opacity: 1.0, minZoom: 1, maxZoom: 28
        });
        map.addLayer(layer_GoogleSatellite_0);

        function pop_lastyh_1(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>Kecamatan (WADMKC):</strong><br />' + (feature.properties['WADMKC'] || '-') + '</td></tr>\
                    <tr><td colspan="2"><strong>Kelurahan (NAMOBJ):</strong><br />' + (feature.properties['NAMOBJ'] || '-') + '</td></tr>\
                    <tr><td colspan="2"><strong>Skor CDI:</strong><br />' + (feature.properties['CDI 1'] !== null ? feature.properties['CDI 1'] : '-') + '</td></tr>\
                    <tr><th scope="row">Kepadatan</th><td>' + (feature.properties['Kepadatan'] || '0') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_lastyh_1_0(feature) {
            var cdiVal = feature.properties['CDI 1'];
            var color = 'rgba(255,255,255,0)';
            
            if (cdiVal !== null && cdiVal !== undefined) {
                if (cdiVal >= 0.00 && cdiVal <= 0.25) color = 'rgba(26,150,65,1.0)';
                else if (cdiVal > 0.25 && cdiVal <= 0.50) color = 'rgba(166,217,106,1.0)';
                else if (cdiVal > 0.50 && cdiVal <= 0.65) color = 'rgba(255,255,192,1.0)';
                else if (cdiVal > 0.65 && cdiVal <= 0.77) color = 'rgba(253,174,97,1.0)';
                else if (cdiVal > 0.77 && cdiVal <= 1.00) color = 'rgba(215,25,28,1.0)';
            }
            return {
                pane: 'pane_lastyh_1',
                opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1.0, 
                fill: true, fillOpacity: 1, fillColor: color, interactive: true
            }
        }

        map.createPane('pane_lastyh_1');
        map.getPane('pane_lastyh_1').style.zIndex = 401;
        var layer_lastyh_1 = new L.geoJson(json_lastyh_1, {
            pane: 'pane_lastyh_1', onEachFeature: pop_lastyh_1, style: style_lastyh_1_0,
        });
        bounds_group.addLayer(layer_lastyh_1);
        map.addLayer(layer_lastyh_1);

        /* =============================================
           LOGIKA INTERAKTIF (CDI + WILAYAH)
           ============================================= */
        var currentCdiCategory = -1; 
        var cdiCategories = [
            { label: 'Tidak Kumuh',  range: '0 – 0,25',   min: 0,    max: 0.25 },
            { label: 'Ringan',       range: '0,25 – 0,5', min: 0.25, max: 0.50 },
            { label: 'Sedang',       range: '0,5 – 0,65', min: 0.50, max: 0.65 },
            { label: 'Berat',        range: '0,65 – 0,77',min: 0.65, max: 0.77 },
            { label: 'Sangat Kumuh', range: '0,77 – 1',   min: 0.77, max: 1.00 }
        ];

        var wilayahData = {};

        document.addEventListener("DOMContentLoaded", function() {
            // Membaca data GeoJSON untuk mendapatkan daftar Kecamatan & Kelurahan
            layer_lastyh_1.eachLayer(function(layer) {
                var kec = layer.feature.properties['WADMKC']; 
                var kel = layer.feature.properties['NAMOBJ']; 
                
                if(kec) {
                    kec = kec.trim();
                    if(!wilayahData[kec]) wilayahData[kec] = new Set();
                    if(kel) wilayahData[kec].add(kel.trim());
                }
            });

            var selectKec = document.getElementById('select-kecamatan');
            Object.keys(wilayahData).sort().forEach(function(kec) {
                var opt = document.createElement('option');
                opt.value = kec; opt.textContent = kec;
                selectKec.appendChild(opt);
            });
        });

        function onChangeKecamatan() {
            var kecSelected = document.getElementById('select-kecamatan').value;
            var selectKel = document.getElementById('select-kelurahan');
            
            selectKel.innerHTML = '<option value="ALL">-- Semua Kelurahan --</option>';
            
            if(kecSelected !== 'ALL' && wilayahData[kecSelected]) {
                Array.from(wilayahData[kecSelected]).sort().forEach(function(kel) {
                    var opt = document.createElement('option');
                    opt.value = kel; opt.textContent = kel;
                    selectKel.appendChild(opt);
                });
            }
            applyCombinedFilter();
        }

        function filterByCDIClick(catIdx) {
            currentCdiCategory = catIdx;
            document.querySelectorAll('.cdi-btn').forEach(function(b) { b.classList.remove('active'); });
            var activeBtn = (catIdx === -1) ? document.getElementById('btn-all') : document.getElementById('btn-' + catIdx);
            if (activeBtn) activeBtn.classList.add('active');
            applyCombinedFilter();
        }

        function applyCombinedFilter() {
            var kecSelected = document.getElementById('select-kecamatan').value;
            var kelSelected = document.getElementById('select-kelurahan').value;
            var matchedLayers = [];

            layer_lastyh_1.eachLayer(function(sublayer) {
                var fProps = sublayer.feature.properties;
                var cdiVal = fProps['CDI 1'];
                var kecVal = fProps['WADMKC'] ? fProps['WADMKC'].trim() : '';
                var kelVal = fProps['NAMOBJ'] ? fProps['NAMOBJ'].trim() : '';

                // Logika Filter
                var matchKec = (kecSelected === 'ALL' || kecVal === kecSelected);
                var matchKel = (kelSelected === 'ALL' || kelVal === kelSelected);
                var matchWilayah = matchKec && matchKel;

                var matchCdi = true;
                if (currentCdiCategory !== -1) {
                    var cat = cdiCategories[currentCdiCategory];
                    matchCdi = (cdiVal >= cat.min && cdiVal <= cat.max);
                }

                var baseStyle = style_lastyh_1_0(sublayer.feature) || {};
                
                if (matchWilayah && matchCdi) {
                    // Masuk wilayah dan masuk kategori CDI -> Tampil penuh
                    baseStyle.fillOpacity = 1.0;
                    baseStyle.opacity     = 1.0;
                    baseStyle.weight      = 1.5;
                    matchedLayers.push(sublayer);
                } else if (matchWilayah && !matchCdi) {
                    // Masuk wilayah tapi BEDA kategori CDI -> Diredupkan
                    baseStyle.fillOpacity = 0.05;
                    baseStyle.opacity     = 0.15;
                    baseStyle.weight      = 0.5;
                } else {
                    // Beda wilayah sama sekali -> Disembunyikan
                    baseStyle.fillOpacity = 0.0;
                    baseStyle.opacity     = 0.0;
                    baseStyle.weight      = 0.0;
                }
                sublayer.setStyle(baseStyle);
            });

            var banner = document.getElementById('cdiInfoBanner');
            var infoText = "📍 Wilayah: " + (kecSelected === 'ALL' ? 'Semua' : kecSelected) + (kelSelected === 'ALL' ? '' : ' - ' + kelSelected);
            if (currentCdiCategory !== -1) {
                infoText += " | <strong>" + cdiCategories[currentCdiCategory].label + "</strong>";
            }
            infoText += " | <strong>" + matchedLayers.length + "</strong> Ditemukan";
            
            banner.style.display = 'block';
            banner.innerHTML = infoText;

            // Zoom Peta
            if (matchedLayers.length > 0) {
                var zoomGroup = L.featureGroup(matchedLayers);
                map.fitBounds(zoomGroup.getBounds(), { padding: [50, 50], maxZoom: 15 });
            } else if (kecSelected === 'ALL' && currentCdiCategory === -1) {
                map.fitBounds([[-6.40908651656586,106.54663103999921],[-5.992128468130886,107.23905950948236]]);
                banner.style.display = 'none';
            }
        }

        function resetWilayah() {
            document.getElementById('select-kecamatan').value = 'ALL';
            document.getElementById('select-kelurahan').innerHTML = '<option value="ALL">-- Semua Kelurahan --</option>';
            applyCombinedFilter();
        }
        </script>        
    </body>
</html>
